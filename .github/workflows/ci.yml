name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check — py_compile
        run: |
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./__pycache__/*" \
            -exec python -m py_compile {} \;
          echo "✓ Todos os arquivos compilam sem erro"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Check imports
        run: |
          python -c "from utils import safe_str, safe_bool, safe_int"
          python -c "from transformers.stack_extractor import extrair_stacks, detectar_nivel"
          python -c "from database.connection import db_connect, DB_PATH"
          echo "✓ Imports críticos funcionam"
